name: Build FISTF Tournament Manager

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 pandas openpyxl reportlab pydantic pyinstaller
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed \
          --name "FISTF_Tournament_Manager" \
          --add-data "config:config" \
          --add-data "core:core" \
          --add-data "data:data" \
          --add-data "models:models" \
          --add-data "pdf:pdf" \
          --add-data "saves:saves" \
          --add-data "storage:storage" \
          --add-data "ui:ui" \
          --add-data "utils:utils" \
          main.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FISTF_Tournament_Manager_macOS
        path: dist/FISTF_Tournament_Manager
