name: Build FISTF Tournament per macOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pandas openpyxl numpy pillow
      
      - name: 🔍 DEBUG ESTREMO - Lista tutto
        run: |
          echo "=================================="
          echo "📂 DIRECTORY CORRENTE:"
          pwd
          echo "=================================="
          echo ""
          echo "📋 LISTA COMPLETA (ls -la):"
          ls -la
          echo "=================================="
          echo ""
          echo "📁 ALBERO COMPLETO (find .):"
          find . -type f | sort
          echo "=================================="
          echo ""
          echo "🔍 CERCO .json:"
          find . -name "*.json" -type f
          echo "=================================="
          echo ""
          echo "🔍 CERCO .py:"
          find . -name "*.py" -type f
          echo "=================================="
          echo ""
          echo "🔍 CERCO .ico:"
          find . -name "*.ico" -type f
          echo "=================================="
          echo ""
          echo "🔍 CERCO .png:"
          find . -name "*.png" -type f
          echo "=================================="
          echo ""
          echo "🔍 CERCO .xlsx:"
          find . -name "*.xlsx" -type f
          echo "=================================="
      
      - name: Build con PyInstaller (versione fissa)
        run: |
          pyinstaller --windowed --onedir \
            --name "FISTF_Tournament" \
            --icon "Icon.ico" \
            --add-data "Logo.png:." \
            --add-data "fistf_ko_engine.py:." \
            --add-data "fistf_formulas_2_16.json:." \
            --add-data "Categorie_ESEMPIO.xlsx:." \
            --hidden-import pandas \
            --hidden-import openpyxl \
            --hidden-import numpy \
            --hidden-import PIL \
            --hidden-import psutil \
            "GUI_fistf_tk.py"
      
      - name: Verifica build
        run: |
          echo "📂 Contenuto dist:"
          ls -la dist/ || echo "❌ dist non trovata"
      
      - name: Crea ZIP (se build riuscita)
        if: success()
        run: |
          if [ -d "dist/FISTF_Tournament.app" ]; then
            cd dist
            zip -r ../FISTF_Tournament_macOS.zip "FISTF_Tournament.app"
            cd ..
            echo "✅ ZIP creato"
          fi
      
      - name: Carica file
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FISTF-Tournament-macOS
          path: FISTF_Tournament_macOS.zip
