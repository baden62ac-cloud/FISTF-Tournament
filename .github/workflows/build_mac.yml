name: Build FISTF Tournament per macOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pandas openpyxl numpy pillow
      
      - name: Verifica file
        run: |
          echo "📂 Contenuto directory:"
          ls -la
          echo ""
          echo "✅ File presenti:"
          ls -la *.py *.json *.ico *.png *.xlsx || true
      
      - name: Build con PyInstaller (modalità onedir per macOS)
        run: |
          pyinstaller --windowed --onedir --name "FISTF_Tournament" --icon "Icon.ico" --add-data "Logo.png:." --add-data "fistf_ko_engine.py:." --add-data "fistf_formulas_2_16.json:." --add-data "Categorie_ESEMPIO.xlsx:." --hidden-import pandas --hidden-import openpyxl --hidden-import numpy --hidden-import PIL --hidden-import psutil "GUI_fistf_tk.py"
      
      - name: Verifica build
        run: |
          echo "📂 Contenuto dist:"
          ls -la dist/ || echo "❌ Cartella dist non trovata"
          echo ""
          echo "📂 Contenuto app bundle:"
          ls -la "dist/FISTF_Tournament.app/" || echo "❌ App bundle non trovato"
      
      - name: Crea ZIP dell'app
        run: |
          if [ -d "dist/FISTF_Tournament.app" ]; then
            cd dist
            zip -r ../FISTF_Tournament_macOS.zip "FISTF_Tournament.app"
            cd ..
            echo "✅ ZIP creato: FISTF_Tournament_macOS.zip"
            ls -la FISTF_Tournament_macOS.zip
          else
            echo "❌ App bundle non trovato!"
            exit 1
          fi
      
      - name: Carica file
        uses: actions/upload-artifact@v4
        with:
          name: FISTF-Tournament-macOS
          path: FISTF_Tournament_macOS.zip
