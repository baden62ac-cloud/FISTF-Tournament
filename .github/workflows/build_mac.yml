name: Build FISTF Tournament per macOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pandas openpyxl numpy pillow
      
      - name: 🔍 DEBUG - Lista completa file
        run: |
          echo "📂 DIRECTORY CORRENTE:"
          pwd
          echo ""
          echo "📋 TUTTI I FILE (incluso nascosti):"
          ls -la
          echo ""
          echo "📁 STRUTTURA COMPLETA:"
          find . -type f | sort
          echo ""
          echo "🎯 CERCO FILE JSON:"
          find . -name "*.json" -type f
          echo ""
          echo "🎯 CERCO FILE .py:"
          find . -name "*.py" -type f
          echo ""
          echo "🎯 CERCO FILE .ico .png .xlsx:"
          find . -name "*.ico" -o -name "*.png" -o -name "*.xlsx" -type f
      
      - name: Build con PyInstaller
        run: |
          # Usiamo una variabile per il nome del file json
          JSON_FILE=$(find . -name "*.json" -type f | head -1)
          echo "📄 File JSON trovato: $JSON_FILE"
          
          pyinstaller --windowed --onedir \
            --name "FISTF_Tournament" \
            --icon "Icon.ico" \
            --add-data "Logo.png:." \
            --add-data "fistf_ko_engine.py:." \
            --add-data "$JSON_FILE:." \
            --add-data "Categorie_ESEMPIO.xlsx:." \
            --hidden-import pandas \
            --hidden-import openpyxl \
            --hidden-import numpy \
            --hidden-import PIL \
            --hidden-import psutil \
            "GUI_fistf_tk.py"
      
      - name: Verifica build
        run: |
          echo "📂 Contenuto dist:"
          ls -la dist/ || echo "❌ dist non trovata"
          if [ -d "dist/FISTF_Tournament.app" ]; then
            echo "✅ App creata!"
          else
            echo "❌ App non trovata"
          fi
      
      - name: Crea ZIP
        run: |
          if [ -d "dist/FISTF_Tournament.app" ]; then
            cd dist
            zip -r ../FISTF_Tournament_macOS.zip "FISTF_Tournament.app"
            cd ..
            echo "✅ ZIP creato"
          else
            echo "❌ Skip ZIP - app non trovata"
          fi
      
      - name: Carica file
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FISTF-Tournament-macOS
          path: FISTF_Tournament_macOS.zip
