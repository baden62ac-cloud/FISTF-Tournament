name: Build FISTF Tournament per macOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pandas openpyxl numpy pillow
      
      - name: Verifica file
        run: |
          echo "📂 Contenuto directory:"
          ls -la
          echo ""
          echo "✅ File presenti:"
          ls -la *.py *.json *.ico *.png *.xlsx || echo "⚠️ Alcuni file non trovati"
      
      - name: Build con PyInstaller
        run: |
          pyinstaller --windowed --onefile --name "FISTF_Tournament" --icon "Icon.ico" --add-data "Logo.png:." --add-data "fistf_ko_engine.py:." --add-data "fistf_formulas_2_16.json:." --add-data "Categorie_ESEMPIO.xlsx:." --hidden-import pandas --hidden-import openpyxl --hidden-import numpy --hidden-import PIL --hidden-import psutil "GUI_fistf_tk.py"
      
      - name: Verifica build
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build completata"
            ls -la dist/
          else
            echo "❌ Build fallita"
            exit 1
          fi
      
      - name: Crea ZIP
        run: |
          if [ -d "dist" ]; then
            cd dist
            zip -r ../FISTF_Tournament_macOS.zip "FISTF_Tournament.app"
            cd ..
            echo "✅ ZIP creato"
          else
            echo "❌ Cartella dist non trovata"
            exit 1
          fi
      
      - name: Carica file
        uses: actions/upload-artifact@v3
        with:
          name: FISTF-Tournament-macOS
          path: FISTF_Tournament_macOS.zip
