name: Build FISTF Tournament per macOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pandas openpyxl numpy pillow
      
      - name: Verifica file (debug)
        run: |
          echo "📂 Contenuto directory:"
          pwd
          ls -la
          echo ""
          echo "🔍 Cerco file specifici:"
          find . -name "*.json" -type f
          find . -name "*.png" -type f
          find . -name "*.ico" -type f
          find . -name "*.xlsx" -type f
      
      - name: Build con PyInstaller
        run: |
          pyinstaller --windowed --onedir \
            --name "FISTF_Tournament" \
            --icon "Icon.ico" \
            --add-data "Logo.png:." \
            --add-data "fistf_ko_engine.py:." \
            --add-data "fistf_formulas_2_16.json:." \
            --add-data "Categorie_ESEMPIO.xlsx:." \
            --hidden-import pandas \
            --hidden-import openpyxl \
            --hidden-import numpy \
            --hidden-import PIL \
            --hidden-import psutil \
            "GUI_fistf_tk.py"
      
      - name: Verifica build
        run: |
          echo "📂 Contenuto dist:"
          ls -la dist/ || echo "❌ dist non trovata"
          if [ -d "dist/FISTF_Tournament.app" ]; then
            echo "✅ App creata!"
            echo "📂 Contenuto app:"
            ls -la "dist/FISTF_Tournament.app/Contents/MacOS/" || true
          else
            echo "❌ App non trovata"
            exit 1
          fi
      
      - name: Crea ZIP
        run: |
          cd dist
          zip -r ../FISTF_Tournament_macOS.zip "FISTF_Tournament.app"
          cd ..
          echo "✅ ZIP creato"
          ls -la FISTF_Tournament_macOS.zip
      
      - name: Carica file
        uses: actions/upload-artifact@v4
        with:
          name: FISTF-Tournament-macOS
          path: FISTF_Tournament_macOS.zip
